---
layout: full_screen
---

<div class="text-center">
    <h1 class="munichmetal gold">Posts</h1>
    <p class="lead">Random thoughts and content<br>
    </p>
</div>

<div class="row">

    <div class="col-sm-12 col-md-12 col-lg-12">
        <h3 class="gold">{{ page.title }}</h3>
        <p class="lead"><i class="fa fa-user"></i> by <a href="">{{ page.author }}</a></p>
        <p><i class="fa fa-calendar"></i> Posted on {{ post.date | date_to_string}}</p>
        {{ content }}
    </div>

</div>

<div class="row">

    <div class="col-sm-12 col-md-12 col-lg-12">
        <a href="/posts.html">Back to posts</a>
    </div>

</div>
